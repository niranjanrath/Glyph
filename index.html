<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glyph</title>
<meta name="description" content="A lightweight, distraction-free markdown editor with live preview.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#2f6fed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Glyph">
<style>
  :root{
    --bg:#ffffff;
    --bg-editor:#ffffff;
    --bg-preview:#fbfbfc;
    --text:#1f2328;
    --placeholder:#9aa1ac;
    --border:#e6e8eb;
    --header-bg:#ffffff;
    --muted:#6b7280;
    --accent:#2f6fed;
    --danger:#e0483f;
    --menu-bg:#ffffff;
    --menu-hover:#f4f5f7;
    --code-bg:#f1f3f5;
    --shadow: 0 10px 30px rgba(20,20,30,.10), 0 2px 8px rgba(20,20,30,.06);
    --focus-ring: 0 0 0 3px rgba(47,111,237,.25);
    color-scheme: light;
  }
  html[data-theme="dark"]{
    --bg:#17181a;
    --bg-editor:#17181a;
    --bg-preview:#1c1d20;
    --text:#e7e9ec;
    --placeholder:#6b7178;
    --border:#2c2e32;
    --header-bg:#17181a;
    --muted:#8a8f97;
    --accent:#5b8dff;
    --danger:#ff6b62;
    --menu-bg:#1f2124;
    --menu-hover:#2a2d31;
    --code-bg:#232529;
    --shadow: 0 10px 30px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.3);
    --focus-ring: 0 0 0 3px rgba(91,141,255,.3);
    color-scheme: dark;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:background .15s ease,color .15s ease;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 16px;
    background:var(--header-bg);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    -webkit-user-select:none;
    user-select:none;
  }
  .header-left{display:flex;align-items:center;gap:12px;min-width:0;}
  .icon-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:36px;height:36px;
    border:none;
    background:transparent;
    color:var(--text);
    border-radius:8px;
    cursor:pointer;
    flex-shrink:0;
  }
  .icon-btn:hover{background:var(--menu-hover);}
  .icon-btn:focus-visible{outline:none;box-shadow:var(--focus-ring);}
  .app-name{
    font-size:16px;
    font-weight:600;
    letter-spacing:-.01em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .header-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .save-status{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:var(--muted);
    white-space:nowrap;
  }
  .save-status svg{flex-shrink:0;}
  .save-status.saving svg{opacity:.4;}

  /* ---------- Mobile view toggle ---------- */
  .view-toggle{
    display:flex;
    gap:4px;
    padding:8px 16px;
    background:var(--header-bg);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }
  .view-toggle button{
    flex:1;
    border:none;
    background:transparent;
    color:var(--muted);
    font-size:13px;
    font-weight:600;
    padding:8px 10px;
    border-radius:8px;
    cursor:pointer;
    font-family:inherit;
  }
  .view-toggle button.active{
    background:var(--menu-hover);
    color:var(--text);
  }
  .view-toggle button:focus-visible{outline:none;box-shadow:var(--focus-ring);}

  /* ---------- Split layout ---------- */
  main{
    flex:1;
    display:flex;
    min-height:0;
  }
  .split{
    flex:1;
    display:flex;
    min-height:0;
    min-width:0;
  }
  .pane{
    position:relative;
    flex:1 1 50%;
    min-width:0;
    display:flex;
    flex-direction:column;
  }
  .pane-editor{
    border-right:1px solid var(--border);
  }
  .pane-preview{
    background:var(--bg-preview);
  }
  .pane-label{
    display:none;
  }

  #editor{
    flex:1;
    width:100%;
    resize:none;
    border:none;
    outline:none;
    background:var(--bg-editor);
    color:var(--text);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    font-size:14.5px;
    line-height:1.7;
    padding:20px 16px 8px;
    caret-color:var(--accent);
  }
  #editor::placeholder{color:var(--placeholder);}

  #previewContent{
    flex:1;
    overflow:auto;
    padding:20px 20px 24px;
    font-size:15.5px;
    line-height:1.7;
  }

  /* Markdown rendered content styling */
  .markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4{
    line-height:1.3;
    margin:1.1em 0 .5em;
    font-weight:700;
    letter-spacing:-.01em;
  }
  .markdown-body h1{font-size:1.7em;border-bottom:1px solid var(--border);padding-bottom:.25em;}
  .markdown-body h2{font-size:1.4em;border-bottom:1px solid var(--border);padding-bottom:.2em;}
  .markdown-body h3{font-size:1.2em;}
  .markdown-body h1:first-child,.markdown-body h2:first-child,.markdown-body h3:first-child{margin-top:0;}
  .markdown-body p{margin:.6em 0;}
  .markdown-body a{color:var(--accent);text-decoration:none;}
  .markdown-body a:hover{text-decoration:underline;}
  .markdown-body ul,.markdown-body ol{padding-left:1.4em;margin:.6em 0;}
  .markdown-body li{margin:.25em 0;}
  .markdown-body blockquote{
    margin:.8em 0;
    padding:.2em 1em;
    border-left:3px solid var(--accent);
    color:var(--muted);
    background:var(--menu-hover);
    border-radius:0 6px 6px 0;
  }
  .markdown-body code{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    background:var(--code-bg);
    padding:.15em .4em;
    border-radius:5px;
    font-size:.9em;
  }
  .markdown-body pre{
    background:var(--code-bg);
    padding:12px 14px;
    border-radius:8px;
    overflow-x:auto;
    margin:.8em 0;
  }
  .markdown-body pre code{background:none;padding:0;}
  .markdown-body img{max-width:100%;height:auto;border-radius:6px;display:block;margin:.6em 0;}
  .markdown-body hr{border:none;border-top:1px solid var(--border);margin:1.4em 0;}
  .markdown-body table{
    border-collapse:collapse;
    width:100%;
    margin:.8em 0;
    font-size:.95em;
    display:block;
    overflow-x:auto;
  }
  .markdown-body th,.markdown-body td{
    border:1px solid var(--border);
    padding:6px 10px;
    text-align:left;
  }
  .markdown-body th{
    background:var(--menu-hover);
    font-weight:600;
  }
  .markdown-body input[type="checkbox"]{margin-right:.4em;}

  .empty-state{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    pointer-events:none;
    opacity:1;
    transition:opacity .2s ease;
  }
  .empty-state.hidden{opacity:0;}
  .empty-state svg{color:var(--border);}
  .empty-state h2{
    margin:6px 0 0;
    font-size:16px;
    font-weight:600;
    color:var(--muted);
  }
  .empty-state p{
    margin:0;
    font-size:13px;
    color:var(--placeholder);
    text-align:center;
    line-height:1.5;
  }
  .empty-state .heart{margin-top:4px;color:var(--border);}

  footer{
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    padding:10px 16px;
    font-size:12px;
    color:var(--muted);
    border-top:1px solid var(--border);
    flex-shrink:0;
    -webkit-user-select:none;
    user-select:none;
  }
  footer .divider{color:var(--border);}

  /* ---------- Hamburger menu ---------- */
  .overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,.28);
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
    z-index:40;
  }
  .overlay.open{opacity:1;pointer-events:auto;}

  .menu-panel{
    position:fixed;
    top:0;left:0;bottom:0;
    width:280px;
    max-width:85vw;
    background:var(--menu-bg);
    box-shadow:var(--shadow);
    transform:translateX(-100%);
    transition:transform .2s ease;
    z-index:50;
    display:flex;
    flex-direction:column;
    padding:16px 8px;
  }
  .menu-panel.open{transform:translateX(0);}
  .menu-title{
    font-size:13px;
    font-weight:700;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.04em;
    padding:8px 12px 10px;
  }
  .menu-item{
    display:flex;
    align-items:flex-start;
    gap:12px;
    width:100%;
    border:none;
    background:transparent;
    text-align:left;
    padding:10px 12px;
    border-radius:10px;
    cursor:pointer;
    color:var(--text);
    font-family:inherit;
  }
  .menu-item:hover{background:var(--menu-hover);}
  .menu-item:focus-visible{outline:none;box-shadow:var(--focus-ring);}
  .menu-item svg{flex-shrink:0;margin-top:2px;color:var(--muted);}
  .menu-item.danger svg,.menu-item.danger .mi-title{color:var(--danger);}
  .mi-title{font-size:14px;font-weight:600;line-height:1.3;}
  .mi-sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .menu-sep{height:1px;background:var(--border);margin:8px 10px;}

  .toast{
    position:fixed;
    bottom:20px;left:50%;
    transform:translateX(-50%) translateY(8px);
    background:var(--text);
    color:var(--bg);
    padding:9px 16px;
    border-radius:999px;
    font-size:13px;
    font-weight:500;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease, transform .18s ease;
    z-index:60;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Mobile: single-pane view controlled by toggle */
  @media (max-width:767px){
    .split.view-edit .pane-preview{display:none;}
    .split.view-edit .pane-editor{border-right:none;}
    .split.view-preview .pane-editor{display:none;}
  }
  @media (min-width:768px){
    .view-toggle{display:none;}
    #editor{padding:24px 24px 8px;}
    #previewContent{padding:24px 28px 28px;}
    footer{padding:12px 24px;}
    header{padding:16px 24px;}
  }
  @media (min-width:1025px){
    #editor{padding:32px 32px 8px;}
    #previewContent{padding:32px 36px 36px;}
    footer{padding:12px 32px;}
    header{padding:16px 32px;}
  }

  @media print{
    header,footer,.menu-panel,.overlay,.toast,.empty-state,.view-toggle,.pane-editor{display:none !important;}
    .pane-preview{background:#fff;}
    #previewContent{padding:0;color:#000;}
    body{overflow:visible;}
    html[data-theme="dark"] #previewContent{color:#000;}
  }

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="icon-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="menuPanel">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="app-name">Glyph</span>
  </div>
  <div class="header-right">
    <span class="save-status" id="saveStatus">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="saveStatusText">Saved</span>
    </span>
    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">
      <svg id="themeIconSun" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/></svg>
      <svg id="themeIconMoon" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    </button>
  </div>
</header>

<div class="view-toggle" id="viewToggle">
  <button class="active" id="tabEdit" data-view="edit">Edit</button>
  <button id="tabPreview" data-view="preview">Preview</button>
</div>

<main>
  <div class="split view-edit" id="split">
    <div class="pane pane-editor" id="paneEditor">
      <textarea id="editor" placeholder="Start typing your notes in Markdown..." spellcheck="true" aria-label="Markdown editor"></textarea>
      <div class="empty-state" id="emptyState">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l1.5 1.5L15 12" stroke="var(--muted)"/></svg>
        <h2>Start typing your notes...</h2>
        <p>Everything is saved automatically<br>in your browser.</p>
        <svg class="heart" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      </div>
    </div>
    <div class="pane pane-preview" id="panePreview">
      <div id="previewContent" class="markdown-body"></div>
    </div>
  </div>
</main>

<footer>
  <span id="wordCount">0 words</span>
  <span class="divider">|</span>
  <span id="charCount">0 characters</span>
</footer>

<div class="overlay" id="overlay"></div>

<nav class="menu-panel" id="menuPanel" aria-label="Actions menu">
  <div class="menu-title">Actions</div>

  <button class="menu-item" id="saveBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    <span><span class="mi-title">Save</span><br><span class="mi-sub">Manually save the note</span></span>
  </button>

  <button class="menu-item" id="downloadTxtBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
    <span><span class="mi-title">Download Markdown</span><br><span class="mi-sub">Download as .md file</span></span>
  </button>

  <button class="menu-item" id="downloadPdfBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span><span class="mi-title">Download PDF</span><br><span class="mi-sub">Download rendered preview as .pdf</span></span>
  </button>

  <button class="menu-item" id="printBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    <span><span class="mi-title">Print</span><br><span class="mi-sub">Print the rendered note</span></span>
  </button>

  <div class="menu-sep"></div>

  <button class="menu-item danger" id="clearBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    <span><span class="mi-title">Clear</span><br><span class="mi-sub">Clear all content</span></span>
  </button>

  <div class="menu-sep"></div>

  <button class="menu-item" id="menuThemeBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <span><span class="mi-title">Theme</span><br><span class="mi-sub">Toggle light / dark theme</span></span>
  </button>

  <button class="menu-item" id="aboutBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <span><span class="mi-title">About</span><br><span class="mi-sub">About this app</span></span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function(){
  "use strict";

  var STORAGE_NOTE = "notepad.note.v1";
  var STORAGE_THEME = "notepad.theme.v1";

  var editor = document.getElementById("editor");
  var emptyState = document.getElementById("emptyState");
  var wordCountEl = document.getElementById("wordCount");
  var charCountEl = document.getElementById("charCount");
  var saveStatusEl = document.getElementById("saveStatus");
  var saveStatusText = document.getElementById("saveStatusText");
  var menuBtn = document.getElementById("menuBtn");
  var menuPanel = document.getElementById("menuPanel");
  var overlay = document.getElementById("overlay");
  var toast = document.getElementById("toast");
  var themeBtn = document.getElementById("themeBtn");
  var themeIconSun = document.getElementById("themeIconSun");
  var themeIconMoon = document.getElementById("themeIconMoon");
  var previewContent = document.getElementById("previewContent");
  var split = document.getElementById("split");
  var tabEdit = document.getElementById("tabEdit");
  var tabPreview = document.getElementById("tabPreview");

  var saveTimer = null;
  var toastTimer = null;
  var renderTimer = null;

  // ---------- Markdown rendering ----------
  if (window.marked) {
    marked.setOptions({
      gfm: true,
      breaks: true
    });
  }

  function renderMarkdown(){
    var raw = editor.value;
    if (!raw){
      previewContent.innerHTML = "";
      return;
    }
    var html = "";
    try {
      html = window.marked ? marked.parse(raw) : raw.replace(/</g, "&lt;");
    } catch(e){
      html = raw.replace(/</g, "&lt;");
    }
    var clean = window.DOMPurify
      ? DOMPurify.sanitize(html, { ADD_ATTR: ["target", "rel"] })
      : html;
    previewContent.innerHTML = clean;

    // open external links safely in a new tab
    var links = previewContent.querySelectorAll("a[href]");
    for (var i = 0; i < links.length; i++){
      links[i].setAttribute("target", "_blank");
      links[i].setAttribute("rel", "noopener noreferrer");
    }
    // lazy-load images
    var imgs = previewContent.querySelectorAll("img");
    for (var j = 0; j < imgs.length; j++){
      imgs[j].loading = "lazy";
    }
  }

  // ---------- Theme ----------
  function applyTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    themeIconSun.style.display = theme === "dark" ? "none" : "block";
    themeIconMoon.style.display = theme === "dark" ? "block" : "none";
  }

  function loadTheme(){
    var saved = null;
    try { saved = localStorage.getItem(STORAGE_THEME); } catch(e){}
    if (saved !== "light" && saved !== "dark"){
      saved = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    applyTheme(saved);
  }

  function toggleTheme(){
    var current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    var next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    try { localStorage.setItem(STORAGE_THEME, next); } catch(e){}
  }

  themeBtn.addEventListener("click", toggleTheme);
  document.getElementById("menuThemeBtn").addEventListener("click", function(){
    toggleTheme();
    closeMenu();
  });

  // ---------- Mobile edit/preview toggle ----------
  function setView(view){
    split.classList.remove("view-edit", "view-preview");
    split.classList.add(view === "preview" ? "view-preview" : "view-edit");
    tabEdit.classList.toggle("active", view !== "preview");
    tabPreview.classList.toggle("active", view === "preview");
  }
  tabEdit.addEventListener("click", function(){ setView("edit"); });
  tabPreview.addEventListener("click", function(){ setView("preview"); renderMarkdown(); });

  // ---------- Note load / persist ----------
  function loadNote(){
    var saved = "";
    try { saved = localStorage.getItem(STORAGE_NOTE) || ""; } catch(e){}
    editor.value = saved;
    updateCounts();
    updateEmptyState();
    renderMarkdown();
  }

  function persistNote(showStatus){
    try {
      localStorage.setItem(STORAGE_NOTE, editor.value);
      if (showStatus) setSaveStatus("saved");
    } catch(e){
      if (showStatus) setSaveStatus("error");
    }
  }

  function setSaveStatus(state){
    if (state === "saving"){
      saveStatusEl.classList.add("saving");
      saveStatusText.textContent = "Saving…";
    } else if (state === "error"){
      saveStatusEl.classList.remove("saving");
      saveStatusText.textContent = "Storage full";
    } else {
      saveStatusEl.classList.remove("saving");
      saveStatusText.textContent = "Saved";
    }
  }

  function updateCounts(){
    var text = editor.value;
    var trimmed = text.trim();
    var words = trimmed.length === 0 ? 0 : trimmed.split(/\s+/).length;
    wordCountEl.textContent = words + (words === 1 ? " word" : " words");
    charCountEl.textContent = text.length + (text.length === 1 ? " character" : " characters");
  }

  function updateEmptyState(){
    if (editor.value.length === 0){
      emptyState.classList.remove("hidden");
    } else {
      emptyState.classList.add("hidden");
    }
  }

  editor.addEventListener("input", function(){
    updateCounts();
    updateEmptyState();
    setSaveStatus("saving");
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      persistNote(true);
    }, 500);

    if (renderTimer) clearTimeout(renderTimer);
    renderTimer = setTimeout(renderMarkdown, 150);
  });

  window.addEventListener("beforeunload", function(){
    try { localStorage.setItem(STORAGE_NOTE, editor.value); } catch(e){}
  });

  // ---------- Toast ----------
  function showToast(message){
    toast.textContent = message;
    toast.classList.add("show");
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){
      toast.classList.remove("show");
    }, 1800);
  }

  // ---------- Menu ----------
  function openMenu(){
    menuPanel.classList.add("open");
    overlay.classList.add("open");
    menuBtn.setAttribute("aria-expanded", "true");
  }
  function closeMenu(){
    menuPanel.classList.remove("open");
    overlay.classList.remove("open");
    menuBtn.setAttribute("aria-expanded", "false");
  }
  menuBtn.addEventListener("click", function(){
    if (menuPanel.classList.contains("open")) closeMenu(); else openMenu();
  });
  overlay.addEventListener("click", closeMenu);
  document.addEventListener("keydown", function(e){
    if (e.key === "Escape") closeMenu();
  });

  // ---------- Actions ----------
  function triggerDownload(blob, filename){
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  function dateStamp(){
    var d = new Date();
    function pad(n){ return n < 10 ? "0" + n : "" + n; }
    return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
  }

  document.getElementById("saveBtn").addEventListener("click", function(){
    persistNote(true);
    showToast("Note saved");
    closeMenu();
  });

  document.getElementById("downloadTxtBtn").addEventListener("click", function(){
    var blob = new Blob([editor.value], { type: "text/markdown;charset=utf-8" });
    triggerDownload(blob, "note-" + dateStamp() + ".md");
    showToast("Downloaded as .md");
    closeMenu();
  });

  document.getElementById("downloadPdfBtn").addEventListener("click", function(){
    closeMenu();
    try {
      var jsPDFCtor = window.jspdf && window.jspdf.jsPDF;
      if (!jsPDFCtor || !window.html2canvas){ throw new Error("PDF libs unavailable"); }
      renderMarkdown();
      var doc = new jsPDFCtor({ unit: "pt", format: "a4" });
      var pageWidth = doc.internal.pageSize.getWidth();
      var margin = 40;
      doc.html(previewContent, {
        x: margin,
        y: margin,
        width: pageWidth - margin * 2,
        windowWidth: previewContent.scrollWidth || 700,
        html2canvas: { scale: 0.72 },
        callback: function(pdf){
          pdf.save("note-" + dateStamp() + ".pdf");
          showToast("Exported as PDF");
        }
      });
    } catch(err){
      showToast("PDF export unavailable offline");
    }
  });

  document.getElementById("printBtn").addEventListener("click", function(){
    closeMenu();
    renderMarkdown();
    setTimeout(function(){ window.print(); }, 150);
  });

  document.getElementById("clearBtn").addEventListener("click", function(){
    if (editor.value.length > 0){
      var confirmed = window.confirm("Clear all content? This cannot be undone.");
      if (!confirmed) return;
    }
    editor.value = "";
    persistNote(true);
    updateCounts();
    updateEmptyState();
    renderMarkdown();
    showToast("Note cleared");
    closeMenu();
    editor.focus();
  });

  document.getElementById("aboutBtn").addEventListener("click", function(){
    closeMenu();
    showToast("Notepad — a simple, private, offline markdown editor");
  });

  // ---------- Init ----------
  loadTheme();
  loadNote();
  editor.focus();

  // ---------- Service worker (offline + installability) ----------
  if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("sw.js").catch(function(){ /* ignore in unsupported contexts */ });
    });
  }
})();
</script>
</body>
</html>
